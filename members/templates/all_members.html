<!DOCTYPE html>
<html></html>
<body>
    <h1>Members</h1>
    <table border="1">
    <tr>
        <th>Name</th>
        <th>Subject</th>
        <th>Email</th>

    </tr>
    {% for x in mymembers %}
    <tr>
        <td>{{x.name}}</td>
        <td>{{x.subject}}</td>
        <td>{{x.email}}</td>
    </tr>

        {% empty %}

        <tr>
            <td colspan="4"> No data found</td>
        </tr>
        {% endfor %}
    </table>
    
</body>
</html>
