<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
}

/* Container */
.container {
    width: 80%;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* Heading */
.container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

/* Table Header */
th {
    background: #4facfe;
    color: white;
    padding: 10px;
    text-align: left;
}

/* Table Rows */
td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* Zebra effect */
tr:nth-child(even) {
    background: #f9f9f9;
}

/* Hover effect */
tr:hover {
    background: #f1f1f1;
}

/* Delete Button */
button {
    padding: 6px 12px;
    background: #ff4d4d;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #cc0000;
}

/* Pagination Links */
a {
    text-decoration: none;
    padding: 8px 12px;
    margin: 5px;
    background: #4facfe;
    color: white;
    border-radius: 5px;
    transition: 0.3s;
}

a:hover {
    background: #007bff;
}

/* Current Page */
.action {
    padding: 8px 12px;
    margin: 5px;
    background: #333;
    color: white;
    border-radius: 5px;
}
    </style>
</head>
<body>
    <div class="container">
        <h2>ALL DATA</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
             {% for i in page_obj %}
            <tr>
                <td>{{i.id}}</td>
                <td>{{i.name}}</td>
                <td>{{i.subject}}</td>
                <td>{{i.email}}</td>
                <td>
                    <button data-id="{{i.id}}">
                        Delete
                    </button>
                </td>
            </tr>
            {% endfor %}
        </table>

        <!--Paginator-->
    {% if page_obj.has_previous %}
        <a href="?page=1">First</a>
        <a href="?page={{ page_obj.previous_page_number }}">Prev</a>
    {% endif %}

    <span class="action">Page {{ page_obj.number }}</span>

    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}">Next</a>
        <a href="?page={{ page_obj.paginator.num_pages }}">Last</a>
    {% endif %}
        </div>

    </div>
</body>
</html>
