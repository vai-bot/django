<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h2>ALL DATA</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
            {% for i in page_obj %}
            <tr>
                <td>({i.id})</td>
                <td>({i.name})</td>\
                <td>({i.subject})</td>
                <td>({i.email})</td>
            </tr>
            {% endfor %}
        </table>

        <!--Paginator-->
        < class="Paginator">
    {% if page_obj.has_previous %}
        <a href="?page=1">First</a>
        <a href="?page={{ page_obj.previous_page_number }}">Prev</a>
    {% endif %}

    <span class="action">Page {{ page_obj.number }}</span>

    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}">Next</a>
        <a href="?page={{ page_obj.paginator.num_pages }}">Last</a>
    {% endif %}
        </div>

    </div>
</body>
</html>
